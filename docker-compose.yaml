# Docker-Setup für ein Symfony 7.4 Projekt
# Services: php (PHP-FPM 8.4) + nginx (HTTP) + database (PostgreSQL)
#
# Ports nach außen:
#   - HTTP-Server:  http://localhost:8080
#   - PostgreSQL:   localhost:5432  (z.B. für DBeaver / TablePlus / psql)

services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: symfony_php
    volumes:
      # Dein Projektcode wird live in den Container gespiegelt
      - ./:/var/www/app:cached
    environment:
      # Verbindung zur Datenbank unten (Hostname = Servicename "database")
      DATABASE_URL: "postgresql://app:app@database:5432/app?serverVersion=16&charset=utf8"
    depends_on:
      database:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: symfony_nginx
    ports:
      # host:container  ->  links die Zahl ändern, falls 8080 belegt ist
      - "8080:80"
    volumes:
      - ./:/var/www/app:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  database:
    image: postgres:16-alpine
    container_name: symfony_database
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      # DB-Port nach außen, damit du mit einem GUI-Tool draufkommst
      - "5432:5432"
    volumes:
      # Daten überleben "docker compose down" (nur "down -v" löscht sie)
      - database_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  database_data:
